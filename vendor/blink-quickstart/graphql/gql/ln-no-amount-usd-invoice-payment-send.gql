mutation lnNoAmountUsdInvoicePaymentSend(
  $input: LnNoAmountUsdInvoicePaymentInput!
) {
  lnNoAmountUsdInvoicePaymentSend(input: $input) {
    errors {
      code
      message
    }
    status
    transaction {
      externalId
      initiationVia {
        ... on InitiationViaLn {
          paymentHash
          paymentRequest
        }
      }
      settlementVia {
        ... on SettlementViaIntraLedger {
          preImage
        }
        ... on SettlementViaLn {
          preImage
        }
      }
    }
  }
}
